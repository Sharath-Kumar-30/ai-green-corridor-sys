services:
  postgres:
    image: postgres:18.2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: green_corridor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: "postgresql+psycopg2://postgres:admin123@postgres:5432/green_corridor"
      RABBITMQ_URL: "pyamqp://guest:guest@rabbitmq:5672//"
      REDIS_URL: "redis://redis:6379/0"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin123"
      MINIO_BUCKET: "uploads"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app

  worker:
    build:
      context: ./backend
    environment:
      DATABASE_URL: "postgresql+psycopg2://postgres:admin123@postgres:5432/green_corridor"
      RABBITMQ_URL: "pyamqp://guest:guest@rabbitmq:5672//"
      REDIS_URL: "redis://redis:6379/0"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin123"
      MINIO_BUCKET: "uploads"
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info", "-Q", "yolo_queue"]
    depends_on:
      - backend
      - rabbitmq
      - redis
      - minio

  flower:
    image: mher/flower
    command: ["--broker=amqp://guest:guest@rabbitmq:5672//"]
    ports:
      - "5555:5555"
    depends_on:
      - rabbitmq

  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  pgdata:
  miniodata:
